<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFYSA - 404 Rotta Smarrita</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --wolf-dark: #1e362d;
            --wolf-green: #588157;
            --nav-glass: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0; padding: 0;
            background: #f4f7f4;
            height: 100vh;
            display: flex; flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: var(--nav-glass); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 9999; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-logo { font-family: 'Montserrat', sans-serif; font-weight: 900; color: var(--wolf-dark); text-decoration: none; text-transform: uppercase; }

        /* PARTNER BAR */
        .partner-bar { background: var(--wolf-dark); color: white; text-align: center; padding: 10px; font-size: 0.75rem; margin-top: 70px; }

        /* ERROR CONTENT */
        .error-main {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .error-card {
            background: white; padding: 50px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); max-width: 500px;
        }
        .error-code { font-family: 'Montserrat', sans-serif; font-size: 6rem; font-weight: 900; color: var(--wolf-green); margin: 0; }
        h2 { font-family: 'Montserrat', sans-serif; color: var(--wolf-dark); margin-bottom: 20px; }
        
        .btn-action {
            display: inline-block; background: var(--wolf-green); color: white;
            padding: 15px 35px; border-radius: 50px; text-decoration: none;
            font-weight: 700; text-transform: uppercase; transition: 0.3s;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(88,129,87,0.3); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/index.html" class="nav-logo">Wolfysa</a>
    </nav>

    <div class="partner-bar">SISTEMI DI NAVIGAZIONE A CURA DI <strong>AVIATION EAGLE</strong></div>

    <div class="error-main">
        <div class="error-card">
            <div style="font-size: 3rem; color: var(--wolf-green); margin-bottom: 10px;"><i class="fas fa-compass"></i></div>
            <p class="error-code">404</p>
            <h2>Fuori Rotta</h2>
            <p>Le coordinate inserite non corrispondono a nessun hangar Wolfysa. Il radar non rileva segnali in quest'area.</p>
            <a href="https://wolfysa.collaborazioni.aviationeagle.co.uk" class="btn-action">Torna in volo</a>
        </div>
    </div>

</body>
</html>
